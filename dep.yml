apiVersion: apps/v1
kind: Deployment
metadata:
  name: liveproject
  labels:
    app: nginx-app
spec:
  replicas: 6
  selector:
    matchLabels:
      app: nginx-app
  template:
    metadata:
      labels:
        app: nginx-app
    spec:
      containers:
      - name: nginx-container
        image: devopsbyrushi/myapplication:v2
        ports:
        - containerPort: 80
---

apiVersion: v1
kind: Service
metadata:
  name: my-service-liveproject
spec:
  type: NodePort
  selector:
    app: nginx-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 31111
